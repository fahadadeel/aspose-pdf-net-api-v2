name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -q -r requirements-ci.txt

      - name: Lint with ruff
        run: python -m ruff check .

      - name: Security scan (bandit)
        run: python -m bandit -c bandit.yaml -r . -lll

      - name: Dependency vulnerability audit (pip-audit)
        run: python -m pip_audit -r requirements-ci.txt
        continue-on-error: true

      - name: Run unit tests
        run: python -m pytest tests/ -v --cov --cov-report=term-missing
