version: 2
updates:
  # Python runtime dependencies
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Asia/Karachi"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "python"
    commit-message:
      prefix: "deps"
      include: "scope"
    groups:
      runtime:
        patterns: ["*"]
        exclude-patterns:
          - "ruff"
          - "pytest*"
          - "bandit"
          - "pip-audit"
      dev:
        patterns:
          - "ruff"
          - "pytest*"
          - "bandit"
          - "pip-audit"

  # GitHub Actions workflows
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Asia/Karachi"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "ci"
    commit-message:
      prefix: "ci"
      include: "scope"
