stages:
  - test
  - mutation
  - trigger
  - build-image
  - generate

# ── Stage 1: Unit tests (every push to main / MR) ──────────────────────────────
unit-tests:
  stage: test
  image: python:3.12-slim
  before_script:
    - pip install -q -r requirements-ci.txt
  script:
    - python -m ruff check . --exclude .venv
    - python -m bandit -c bandit.yaml -r . -lll
    - python -m pip_audit -r requirements-ci.txt || true
    - python -m mypy --config-file mypy.ini . || true
    - python -m pytest tests/ -v --cov --cov-report=term-missing
    - python scripts/export_openapi.py
    - GITLAB_TOKEN="${POLICY_DRIFT_TOKEN:-}" GITLAB_PROJECT_ID="${CI_PROJECT_ID}" GITLAB_HOST="${CI_SERVER_HOST}" python scripts/check_policy_drift.py
  artifacts:
    when: always
    expire_in: 30 days
    paths:
      - docs/openapi.json
  only:
    - main
    - merge_requests

# ── Stage 2: Mutation testing (scheduled, informational) ──────────────────────
# Runs only when a Pipeline Schedule fires with RUN_MUTATION_TESTS=true.
# Set the schedule via GitLab UI: Settings → CI/CD → Schedules.
# Recommended cadence: alternate day cron `0 6 */2 * *` (06:00 every 2 days).
# Never blocks merges — output uploaded as artifact for review.
mutation-tests:
  stage: mutation
  image: python:3.12-slim
  before_script:
    - pip install -q -r requirements-ci.txt
  script:
    # Runs the full mutation suite against the modules in setup.cfg [mutmut].
    # Exit code is always non-zero when any mutation survives (expected) —
    # `|| true` keeps the job result informational.
    - python -m mutmut run || true
    - python -m mutmut results > mutmut-report.txt 2>&1 || true
    - echo "─── MUTATION REPORT SUMMARY ───"
    - tail -50 mutmut-report.txt
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule" && $RUN_MUTATION_TESTS == "true"'
  artifacts:
    when: always
    expire_in: 30 days
    paths:
      - mutmut-report.txt
      - mutants/

# ── Stage 3: Scheduled sweep trigger (Path B — VM does the work) ──────────────
# Fires when a Pipeline Schedule sets TRIGGER_SWEEP=true.
# Calls the production VM's /api/start-tasks endpoint, polls until done,
# fails the job if pass rate falls below SWEEP_PASS_RATE_THRESHOLD.
#
# Required CI/CD variables (set under Settings → CI/CD → Variables):
#   VM_BASE_URL                  e.g. http://172.20.1.175:7103  (protected)
#   VM_API_KEY                   matches API_KEY env var on the VM (masked + protected)
#   SWEEP_PASS_RATE_THRESHOLD    0.95 (protected)
#
# To activate, create a Pipeline Schedule with:
#   Cron: 13 21 * * 0   (Sunday 02:13 PKT — minute 13 satisfies GitLab worker)
#   Branch: main
#   Variable: TRIGGER_SWEEP=true
#
# See docs/automation.md for the full workflow.
scheduled-sweep:
  stage: trigger
  image: alpine:3.20
  timeout: 6 hours
  before_script:
    - apk add --no-cache curl jq bc coreutils
  script:
    - sh scripts/ci/scheduled-sweep.sh
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule" && $TRIGGER_SWEEP == "true"'
  artifacts:
    when: always
    expire_in: 90 days
    paths:
      - sweep_result.json

# ── Stage 4: Build CI image (Python 3.12 + .NET 10.0) ─────────────────────────
# Runs only when Dockerfile.ci or requirements-ci.txt changes, or manually.
build-ci-image:
  stage: build-image
  image: docker:latest
  services:
    - docker:dind
  variables:
    DOCKER_TLS_CERTDIR: ""
    DOCKER_HOST: "tcp://docker:2375"
    IMAGE_TAG: "$CI_REGISTRY_IMAGE/ci-runner:latest"
  before_script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
  script:
    - docker build -f Dockerfile.ci -t "$IMAGE_TAG" .
    - docker push "$IMAGE_TAG"
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: manual

# ── Stage 5: Generate examples directly in the CI runner (Path A — fallback) ──
# Legacy path: runs the pipeline inside the runner container instead of on the
# VM. Useful if the VM is unreachable, or for one-off runs that shouldn't touch
# production state. The scheduled-sweep job (Path B) is the preferred path
# because it lets learned state accumulate on the VM.
# Triggered via GitLab pipeline schedule.
# Set CATEGORY variable in the schedule to run a specific category,
# or leave unset to run all categories.
generate-examples:
  stage: generate
  image: "$CI_REGISTRY_IMAGE/ci-runner:latest"
  timeout: 3 hours
  variables:
    # These must be set as CI/CD variables in GitLab project settings:
    # REPO_TOKEN       - GitHub PAT for pushing to aspose-pdf/agentic-net-examples
    # LITELLM_API_KEY  - LLM proxy API key
    # REPO_PATH        - local clone path for the examples repo (e.g. /tmp/examples-repo)
    PYTHONUNBUFFERED: "1"
    NUGET_VERSION: "26.5.0"
    API_URL: "http://172.20.1.175:7050/mcp/generate"
    MCP_RETRIEVE_URL: "http://172.20.1.175:7050/mcp/retrieve"
    CATEGORIES_API_URL: "http://172.20.1.175:7061/api/categories"
  before_script:
    - pip install -q -r requirements-ci.txt --break-system-packages || true
    - git config --global user.email "ci@aspose-examples.com"
    - git config --global user.name "Aspose Examples CI"
  script:
    - |
      if [ -n "$CATEGORY" ]; then
        echo "Running category: $CATEGORY"
        python cli.py --sweep --categories "$CATEGORY" --repo-push
      else
        echo "Running all categories"
        python cli.py --sweep --repo-push
      fi
  only:
    - schedules
  artifacts:
    when: always
    expire_in: 7 days
    paths:
      - results/
      - "*.log"
