# Project-level config used by mutmut.
# We keep this minimal — pytest config lives in pytest.ini, lint in ruff.toml,
# coverage in .coveragerc, type-check in mypy.ini.

[mutmut]
# Initial mutation scope — high-coverage, pure-logic modules where
# surviving mutations almost always indicate a real test gap.
# Expand this list as test depth grows.
source_paths =
    pipeline/error_parser.py,
    pipeline/prompt_builder.py,
    pipeline/models.py,
    middleware/security.py,
    knowledge/error_fixes.py,
    knowledge/pattern_tracker.py,
    routers/health.py

# Pytest invocation: select only the tests dir, disable coverage so the
# mutation runs don't trip the --cov-fail-under gate from pytest.ini.
pytest_add_cli_args =
    --no-cov,
    -q,
    -x,
    --no-header

pytest_add_cli_args_test_selection =
    tests/

# Skip private members — mutations there rarely indicate real test gaps.
do_not_mutate =
    *.py:_*

# Be patient with slow tests (integration suite boots the full FastAPI app).
timeout_multiplier = 2.0
timeout_constant = 5.0

# Only mutate lines that pytest actually exercised — focuses signal on
# code paths the tests claim to cover.
mutate_only_covered_lines = true
