# Grafana datasource provisioning.
# Auto-loaded by Grafana on startup from
# /etc/grafana/provisioning/datasources/datasources.yaml.

apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false
    jsonData:
      timeInterval: 30s
      httpMethod: POST
