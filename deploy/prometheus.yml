# Prometheus scrape config for the compose.production.yaml stack.
# Mounted read-only into the prometheus container at
# /etc/prometheus/prometheus.yml.

global:
  scrape_interval: 30s
  scrape_timeout: 10s
  evaluation_interval: 30s
  external_labels:
    environment: container

scrape_configs:
  # The Examples Generator itself
  - job_name: aspose-pdf-api-v2
    metrics_path: /api/metrics/prometheus
    static_configs:
      - targets: ["app:7103"]
        labels:
          service: aspose-pdf-api-v2
          env: production

  # Prometheus self-monitoring — useful for "is the scraper alive" alerts
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

# Alert rules live in a separate file mounted in compose.production.yaml
# when needed. The defaults from docs/observability.md are documented
# there; this file is the scrape-only baseline.
