# Reproducible production deployment.
#
# Brings up three services:
#   app         — the Examples Generator (Python 3.12 + .NET 10)
#   prometheus  — scrapes /api/metrics/prometheus every 30s
#   grafana     — auto-provisions the dashboard from docs/grafana/
#
# Usage:
#   docker compose -f compose.production.yaml up --build
#
# Configuration:
#   .env at the repo root supplies secrets (LITELLM_API_KEY, REPO_TOKEN, etc.)
#   See .env.example for the full list of variables the service understands.
#
# Persistent state (mounted from the host):
#   ./results/    — disk-backed task results survives container restarts
#   ./resources/  — knowledge base + auto-learned rules (read+write)
#   ./logs/       — service stdout/stderr capture
#
# The Windows VM production deployment stays on NSSM for now; this stack
# is the reproducible alternative for testing, staging, and future
# container-based deployments.

services:

  # ── Service ──────────────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: aspose-pdf-api-v2:latest
    container_name: aspose-pdf-api-v2
    restart: unless-stopped
    ports:
      - "7103:7103"
    env_file:
      - .env
    environment:
      # Bind to all interfaces inside the container regardless of host config
      UI_PORT: "7103"
      # Open CORS to the Prometheus / Grafana containers on the same compose
      # network. For external access, set this in .env instead.
      CORS_ORIGINS: "http://localhost:7103,http://prometheus:9090,http://grafana:3000"
    volumes:
      - ./results:/app/results
      - ./resources:/app/resources
      - ./logs:/app/logs
    networks:
      - aspose-net
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:7103/api/health/ready"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3

  # ── Prometheus ───────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v3.0.1
    container_name: aspose-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./deploy/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"
    networks:
      - aspose-net
    depends_on:
      - app

  # ── Grafana ──────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:11.3.1
    container_name: aspose-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      # Disable anonymous access — change in .env if you want a public read-only view
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_INSTALL_PLUGINS: ""
    volumes:
      - grafana-data:/var/lib/grafana
      # Datasource + dashboard provisioning
      - ./deploy/grafana/datasources.yaml:/etc/grafana/provisioning/datasources/datasources.yaml:ro
      - ./deploy/grafana/dashboards.yaml:/etc/grafana/provisioning/dashboards/dashboards.yaml:ro
      # The actual dashboard JSON files
      - ./docs/grafana:/var/lib/grafana/dashboards:ro
    networks:
      - aspose-net
    depends_on:
      - prometheus

networks:
  aspose-net:
    driver: bridge

volumes:
  prometheus-data:
  grafana-data:
